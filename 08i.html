<!DOCTYPE html>
<html>
  <head></head>
  <body>

    <p>
      <button onClick = "gamePlay('heads');">heads</button>
      <button onClick = "gamePlay('tails');">tails</button>

    </p>
    <script>
      
      const score = JSON.parse(localStorage.getItem("score")) || {wins:0, losses:0};

      function gamePlay(guess) {
        const randomNumber = Math.random();
        let computerMove = '';

        if (randomNumber < 0.5) {
          computerMove = 'heads';
        } else {
          computerMove = 'tails';
        }

        if (guess === computerMove) {
          score.wins += 1;
          console.log('You win!');
        } else {
          score.losses += 1;
          console.log('You lose!');
        }
 
        localStorage.setItem("score", JSON.stringify(score));
        console.log(score);
      }

    </script>
  </body>
</html>
