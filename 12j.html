<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>12j</title>
</head>
<body>
  <script>

    const multiply = (val1, val2) => {
      return val1*val2;
    }
    console.log(multiply(2,3));

    const multiply2 = (val1,val2) => val1*val2;
    console.log(multiply2(7,10));

    const countPositives = arr => {
      let cp = 0;
      arr.forEach(element => {
        if (element>0){
          cp+=1;
        }
      }
      );
      return cp;
    };

    console.log(countPositives([1 , -3, 5]));

    const addNum = (arr, num) => {
      return arr.map(val => val+num);
    };

    console.log(addNum([1,2,3],3));

    const removeEggs = foods => {
      return foods.filter(val => {
        return val!='egg';
      });
    };

    console.log(removeEggs(['ham', 'apple', 'egg', 'egg', 'orange']));

    const removeFirstTwoEggs = foods => {
      let removedEggs = 0;
      return foods.filter(food => {
        if(food==='egg' && removedEggs<2){
          removedEggs ++;
          return false;
        }
        return true;
      });
    };

    console.log(removeFirstTwoEggs(['ham','ham','egg','banana','orange','egg','ribs','egg']));

  </script>
</body>
</html>
