<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To Do list</title>

  <link rel="stylesheet" href="styles/12_todo_list.css">
</head>
<body>
  <p>Todo list</p>

  <div class="todo-input-grid">
    <input placeholder="ToDo name" class="todo-value name-input"
    onkeydown="UpdateToDoListKeyDown(event);"
    >
    <input type="date" class="due-date due-date-input">
    <button onClick = "UpdateToDoList();" class = "add-button">Add</button>
  </div>
  
  <div class="todo-list todo-grid"></div>

  <script src="scripts/12_todo_list.js"></script>

</body>
</html>
