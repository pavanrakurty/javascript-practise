<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors (12r)</title>

    <link
      rel="stylesheet"
      href="styles/12r_rock_paper_scissors.css"
    ></link>
  </head>
  <body>
    <p class="title">Rock Paper Scissors</p>
    <button class = "move-button js-button-rock"
    ><img src="images/rock-emoji.png" class="move-icon"></button>

    <button class = "move-button js-button-paper"
    ><img src="images/paper-emoji.png" class="move-icon"></button>

    <button class = "move-button js-button-scissors"
    ><img src="images/scissors-emoji.png" class="move-icon"></button>

    <p class="js-result result"></p>
    <p class="js-moves"></p>
    <p class="js-score score"></p>

    <button class = "reset js-reset-button">Reset Score</button>

    <button class="auto-play js-auto-play js-stop-auto-play">Auto Play</button>

    <div class="reset-confirmation js-reset-confirmation">
      
    </div>

    <script src="scripts/12r_rock_paper_scissors.js"></script>
  </body>
</html>
