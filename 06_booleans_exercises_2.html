<!DOCTYPE html>

  <head>
    <title>Cart quantity</title>
      
  </head>

  <body>
    <p>Cart quantity</p>
    <button 
      onClick="console.log(`Cart quantity: ${cartQuantity}`)"
    >
      Show quanity
    </button>
    <button
      onClick="
      if (cartQuantity+1>maxQuantity){
        alert('Cart is full!')
      }
      else{
        cartQuantity++;
      }
      console.log(`Cart quantity: ${cartQuantity}`)
      "
    >Add to cart</button>
    <button
    onClick="
      if (cartQuantity+2>maxQuantity){
        alert('Cart is full!')
      }
      else{
        cartQuantity+=2;
      }
      console.log(`Cart quantity: ${cartQuantity}`)
    "
    >+2</button>
    <button
    onClick="
      if (cartQuantity+3>maxQuantity){
        alert('Cart is full!')
      }
      else{
        cartQuantity+=3;
      }
      console.log(`Cart quantity: ${cartQuantity}`)
    "
    >+3</button>
    <button
    onClick="
      if (cartQuantity+4>maxQuantity){
        alert('Cart is full!')
      }
      else{
        cartQuantity+=4;
      }
      console.log(`Cart quantity: ${cartQuantity}`)
    "
    >+4</button>
    <button
    onClick="
      if (cartQuantity+5>maxQuantity){
        alert('Cart is full!')
      }
      else{
        cartQuantity+=5;
      }
      console.log(`Cart quantity: ${cartQuantity}`)
    "
    >+5</button>
    <button
    onClick="
        cartQuantity = 0;
        console.log('Cart is cleared!')
        console.log(`Cart quantity: ${cartQuantity}`)
        "
    >Reset cart</button>
    <button
    onClick="
        if(cartQuantity-1<0){
          alert('Not enough items in cart!')
        }
        else{
          cartQuantity--;
        }
        console.log(`Cart quantity: ${cartQuantity}`)
        "
    >Remove from cart</button>

    <button
    onClick="
        if(cartQuantity -2 < 0){
          alert('Not enough items in cart!')
        }
        else{
          cartQuantity -= 2;
        }
        console.log(`Cart quantity: ${cartQuantity}`)
        "
    >-2</button>

    <button
    onClick="
        if(cartQuantity -3 < 0){
          alert('Not enough items in cart!')
        }
        else{
          cartQuantity -= 3;
        }
        console.log(`Cart quantity: ${cartQuantity}`)
        "
    >-3</button>

    <script>
      let cartQuantity = 0;
      const maxQuantity = 10;
    </script>

  </body>
