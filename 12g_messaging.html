<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messaging App</title>
</head>
<body>

  <button onClick="addMessage();">Add</button>
  <button onClick="removeMessage();">Remove</button>

  <script>

    let messages = 0;
    let interval;
    let messageCountDisplayed = false;

    function addMessage(){
      messages += 1;
      console.log(messages);
      messageInTitle();
    }

    function removeMessage(){
      if(messages>0){
        messages-=1;
      }
      messageInTitle();
      console.log(messages);
    }

    function messageInTitle(){
      clearInterval(interval);

      if(messages>0){
      
        interval = setInterval(
          function(){
              if (!messageCountDisplayed){
                document.title = `(${messages}) new messages`;
                messageCountDisplayed = true;
              }
              else{
                document.title = `Messaging App`;
                messageCountDisplayed = false;
              }
            
          }
          ,1000);
      }
      else{
        document.title = `Messaging App`;
      }
    };

  </script>


  
</body>
</html>
