<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Array and Loops</title>
</head>
<body>

  <script>

    const myArray = [10, 20, 30];
    console.log(myArray);

    myArray.push(40);
    console.log(myArray);

    myArray.splice(0,2); 
    // removes 2 elements starting from 0th index
    console.log(myArray);

    let i = 1;

    while (i<=5){
      console.log(i);
      i++;
    }

    for (let i=6; i<=10; i++){
      console.log(i);
    }

    let randomNumber = 0;

    while (randomNumber < 0.5){
      randomNumber = Math.random();
    }

    console.log(randomNumber);

  </script>
  
</body>
</html>
