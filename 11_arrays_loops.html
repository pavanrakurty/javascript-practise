<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Array and Loops</title>
</head>
<body>

  <script>

    const myArray = [10, 20, 30];
    console.log(myArray);

    myArray.push(40);
    console.log(myArray);

    myArray.splice(0,2); 
    // removes 2 elements starting from 0th index
    console.log(myArray);

  </script>
  
</body>
