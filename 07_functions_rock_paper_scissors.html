<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
  </head>

  <body>
    <p>Rock Paper Scissors</p>
    <button
      onClick = "
        const [computerMove, result] = playGame('rock');
        const scores = returnScore();
        alert('Computer chose '+ computerMove +'.' +result+'.'+scores);
      "
    >Rock</button>
    <button
      onClick = "
        const [computerMove, result] = playGame('paper');
        const scores = returnScore();
        alert('Computer chose '+ computerMove +'.' +result+'.'+scores);
  "
    >Paper</button>
    <button
      onClick = "
        const [computerMove, result] = playGame('scissors');
        const scores = returnScore();
        alert('Computer chose '+ computerMove +'.' +result+'.'+scores);
    "
    >Scissors</button>

    <button
      onClick = "
        resetScore();
        const scores = returnScore();
        alert(scores);
      "
    >Reset</button>

    <p>
      
      <script>

        const score = JSON.parse(localStorage.getItem('scores')) || {wins:0, losses:0, ties:0};

        // console.log(localStorage.getItem('score'));
        console.log(localStorage.getItem('scores'));

        function returnScore() {
          const scores = `Wins: ${score.wins}, Ties: ${score.ties}, Losses: ${score.losses}`;
          return scores;
        }

        function resetScore() {
          score.wins = 0;
          score.ties = 0;
          score.losses = 0;
          localStorage.removeItem('scores');
        }

        function pickComputerMove(){
          let computerMove = '';

          const randomNumber = Math.random();
          
          if (randomNumber >= 0 && randomNumber < 1/3) {
            computerMove = 'rock';
          }
          else if (randomNumber >= 1/3 && randomNumber < 2/3) {
            computerMove = 'paper';
          }
          else {
            computerMove = 'scissors';
          }
          return computerMove;

        }

        function playGame(userMove) {
          
          const computerMove = pickComputerMove();

          let result = '';
          if (userMove === 'rock' && computerMove === 'paper'){
            result = 'You lose';
            score.losses += 1;
          }
          else if (userMove === 'paper' && computerMove === 'rock'){
            result = 'You win';
            score.wins += 1;
          }
          else if (userMove === 'rock' && computerMove ==='scissors'){
            result = 'You win';
            score.wins += 1;
          }
          else if (userMove === 'scissors' && computerMove === 'rock'){
            result = 'You lose';
            score.losses += 1;
          }
          else if (userMove === 'paper' && computerMove === 'scissors'){
            result = 'You lose';
            score.losses += 1;
          }
          else if (userMove === 'scissors' && computerMove === 'paper') {
            result = 'You win';
            score.wins += 1;
          }
          else {
            result = 'Its a tie';
            score.ties += 1;
          }

          localStorage.setItem('scores', JSON.stringify(score));

          return [computerMove,result];
        }


      </script>
    
    </p>
    
  </body>
</html>
