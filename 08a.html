<body>

  <script>
    const product = {name: 'basketball', price: 1595};
    product.price += 500;
    product['delivery-time'] = '3 days';
    console.log(product);

    const product2 = {name: 'basketball', price: 2095};

    function comparePrices(p1, p2) {
      const res = p1.price>= p2.price? p2 : p1;
      return res
    }

    console.log(comparePrices(product, product2));

    function isSameProduct(p1, p2){
      return (p1.name===p2.name && p1.price===p2.price);
    }

    console.log(isSameProduct(product, product2));

    console.log('hello'.repeat(2));


  </script>
