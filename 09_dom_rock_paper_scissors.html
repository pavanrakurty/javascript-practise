<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
  </head>

  <body>
    <p>Rock Paper Scissors</p>
    <button
      onClick = "
        const [computerMove, result] = playGame('rock');
        const scores = returnScore();
      "
    >Rock</button>
    <button
      onClick = "
        const [computerMove, result] = playGame('paper');
        const scores = returnScore();
  "
    >Paper</button>
    <button
      onClick = "
        const [computerMove, result] = playGame('scissors');
        const scores = returnScore();
    "
    >Scissors</button>

    
    <p class="js-result"></p>
    <p class="js-moves"></p>
    <p class="js-scores"></p>

    <button
      onClick = "
        resetScore();
        const scores = returnScore();
      "
    >Reset Score</button>

    <p>
      
      <script>

        const score = JSON.parse(localStorage.getItem('scores')) || {wins:0, losses:0, ties:0};
        
        updateScoreElement();
        // console.log(localStorage.getItem('score'));
        console.log(localStorage.getItem('scores'));

        function returnScore() {
          const scores = `Wins: ${score.wins}, Ties: ${score.ties}, Losses: ${score.losses}`;
          return scores;
        }

        function resetScore() {
          score.wins = 0;
          score.ties = 0;
          score.losses = 0;
          localStorage.removeItem('scores');
          // document.querySelector('.js-scores').innerHTML = `Wins: ${score.wins}, Ties: ${score.ties}, Losses: ${score.losses}`;
          updateScoreElement();
          updateMovesElement();
          updateResultElement();
          
        }

        function pickComputerMove(){
          let computerMove = '';

          const randomNumber = Math.random();
          
          if (randomNumber >= 0 && randomNumber < 1/3) {
            computerMove = 'rock';
          }
          else if (randomNumber >= 1/3 && randomNumber < 2/3) {
            computerMove = 'paper';
          }
          else {
            computerMove = 'scissors';
          }
          return computerMove;

        }

        function playGame(userMove) {
          
          const computerMove = pickComputerMove();

          let result = '';
          if (userMove === 'rock' && computerMove === 'paper'){
            result = 'You lose';
            score.losses += 1;
          }
          else if (userMove === 'paper' && computerMove === 'rock'){
            result = 'You win';
            score.wins += 1;
          }
          else if (userMove === 'rock' && computerMove ==='scissors'){
            result = 'You win';
            score.wins += 1;
          }
          else if (userMove === 'scissors' && computerMove === 'rock'){
            result = 'You lose';
            score.losses += 1;
          }
          else if (userMove === 'paper' && computerMove === 'scissors'){
            result = 'You lose';
            score.losses += 1;
          }
          else if (userMove === 'scissors' && computerMove === 'paper') {
            result = 'You win';
            score.wins += 1;
          }
          else {
            result = 'Its a tie';
            score.ties += 1;
          }

          localStorage.setItem('scores', JSON.stringify(score));

          // document.querySelector('.js-scores').innerHTML = `Wins: ${score.wins}, Ties: ${score.ties}, Losses: ${score.losses}`;
          updateResultElement(result);
          updateMovesElement(userMove, computerMove);
          updateScoreElement();

          return [computerMove,result];
        }

        function updateScoreElement() {
          document.querySelector('.js-scores').innerHTML = `Wins: ${score.wins}, Ties: ${score.ties}, Losses: ${score.losses}`;
        }

        function updateResultElement(result) {
          if (result){
          document.querySelector('.js-result').innerHTML = result;
          }
          else{
            document.querySelector('.js-result').innerHTML = 'You are yet to make a move!';
          }
        }

        function updateMovesElement(userMove, computerMove){
          if(userMove){
            document.querySelector('.js-moves')
              .innerHTML = `You picked ${userMove}. Computer picked ${computerMove}`;
          }
          else{
            document.querySelector('.js-moves').innerHTML = 'You are yet to make a move!';
          }
        }


      </script>
    
    </p>
    
  </body>
</html>
